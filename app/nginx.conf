# env PATH;
# Run workers as root so they can write the SQLite database (and its WAL/-shm
# files) created by `lapis migrate`. This is a single-purpose container behind
# a reverse proxy; without it, the default unprivileged worker user gets
# "attempt to write a readonly database" on every request.
user root;
worker_processes ${{NUM_WORKERS}};
error_log stderr notice;
daemon off;
pid logs/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include mime.types;

    # lua_shared_dict session_cache 150m;
    # lua_shared_dict page_cache 512m;
    # lua_shared_dict query_cache 512m;
    # lua_shared_dict query_cache_categories 150m;

	client_max_body_size ${{BODY_SIZE}};
	client_body_buffer_size ${{BODY_SIZE}};

    # Just to keep the directory clean.
    client_body_temp_path tmp/nginx_client_body_temp;
    proxy_temp_path tmp/nginx_proxy_temp;
    fastcgi_temp_path tmp/nginx_fastcgi_temp;
    uwsgi_temp_path tmp/nginx_uwsgi_temp;
    scgi_temp_path tmp/nginx_scgi_temp;

	lua_package_path "${{LUA_PATH}};;";
	lua_package_cpath "${{LUA_CPATH}};;";

	lua_shared_dict page_cache 15m;
	# Cross-worker lock for the in-process RSS feed scheduler so only one worker
	# refreshes feeds per tick (see src/utils/feed_scheduler.lua).
	lua_shared_dict feed_scheduler 1m;

	init_worker_by_lua_block {
		-- Seed the UUID generator if the library is available; never let its
		-- absence stop the worker from starting. (lua-resty-jit-uuid is not in
		-- the rockspec -- add it there if UUIDs become a hard requirement.)
		local ok, uuid = pcall(require, "resty.jit-uuid")
		if ok then uuid.seed() end

		-- Start the in-process RSS/Atom feed scheduler (a no-op unless enabled
		-- in config). pcall so a scheduler fault can never stop a worker booting.
		local ok_sched, sched = pcall(require, "src.utils.feed_scheduler")
		if ok_sched then pcall(sched.start) end
	}

	init_by_lua_block {
		-- Preload libraries that set Lua globals as a side effect, so the _G
		-- write-guard warning fires once here instead of on every request.
		-- lpeg and the SQLite driver are required by the app, so failing to
		-- load them should be fatal. The rest are optional preloads: pcall so a
		-- missing optional rock can never stop the server from booting.
		require "lpeg"      -- sets _G.lpeg
		require "lsqlite3"  -- SQLite driver; sets _G.sqlite3

		-- NB: there is no 'sqlite2' module (the previous require here crashed
		-- init and prevented the server from booting), and 'sqlite3' is just an
		-- alias for the driver above.
		pcall(require, "markdown") -- not installed in every build
		pcall(require, "mime")     -- luasocket (also pulls in ltn12)
		pcall(require, "socket")
	}

	resolver 127.0.0.11;
	resolver_timeout 4;

	map $http_user_agent $is_crawler {
		default 0;
		"~*crawl|Googlebot|Slurp|bingbot|Ahrefs|Yandex|ia_archiver|Applebot|ysearch|Baiduspider|Exabot|SemrushBot|SMTBot|facebookexternalhit|MegaIndex|PetalBot" 1;
	}

	server {
		listen ${{PORT}};
		lua_code_cache ${{CODE_CACHE}};

		include nginx/http_proxy.conf;

		location / {
			set $_url "";

			if ($request_method = OPTIONS) {
				add_header Content-Length 0;
				add_header Content-Type text/plain;
				access_log off;
				return 200;
			}

			default_type text/html;

			content_by_lua "require('lapis').serve('app')";
		}

		location /static/ {
			alias static/;
			# access_log off;
			gzip on;
			gzip_types application/x-javascript text/css image/svg+xml;
			expires 3d;
			gzip_comp_level 5;
		}

		location /favicon.ico {
			alias static/favicon.ico;
			# access_log off;
		}

		# /robots.txt, /sitemap.xml and /.well-known/security.txt are served by
		# the app (actions.robots / actions.sitemap / actions.security_txt) so
		# they can emit absolute, host-aware URLs -- they fall through to `/`.
	}
}
