name: "spec"

on: [push, pull_request]

jobs:
  # stylua formatting check (config in .stylua.toml, ignores in .styluaignore)
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check app

  # this runs the test suite inside the production docker image (the
  # lapis-archlinux-itchio base with the rockspec deps + live lsqlite3)
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: build
        run: docker build -t pagesix-test .

      # The image's default entrypoint boots `lapis server` against the app
      # mounted at /var/www; here we mount the checkout and override the
      # entrypoint to run busted from the repo root (where .busted lives).
      - name: test
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/src" -w /src
          --entrypoint busted pagesix-test -o utfTerminal

  # this runs all generic lua tests
  test:
    strategy:
      fail-fast: false
      matrix:
        # The app targets the Lua 5.1 ABI (OpenResty/LuaJIT in production); the
        # rockspec pins `lua ~> 5.1` and deps like luabitop/luajit-geoip are
        # 5.1-only, so plain 5.4 cannot resolve dependencies.
        luaVersion: ["5.1", "luajit", "luajit-openresty"]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@master
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - uses: leafo/gh-actions-luarocks@master

      - name: build
        run: |
          # luabitop is only needed (and only builds) on Lua 5.1/5.2.
          if [[ "${{ matrix.luaVersion }}" =~ ^5\.[12]$ ]]; then
            luarocks install luabitop
          fi
          luarocks install busted
          luarocks install moonscript
          luarocks install tableshape
          luarocks install lsqlite3
          luarocks install luacov
          luarocks install luacheck
          luarocks make

      - name: luacheck
        run: luacheck app

      - name: test
        run: |
          busted -o utfTerminal -v --coverage
          luacov
          echo "===== coverage summary ====="
          awk '/^Summary/{f=1} f' luacov.report.out | tail -n 40

      - name: coverage threshold
        run: |
          pct=$(awk '/^Total/{gsub("%","",$NF); print $NF}' luacov.report.out)
          echo "Total coverage: ${pct}% (threshold ${COVERAGE_MIN}%)"
          awk -v p="$pct" -v t="$COVERAGE_MIN" 'BEGIN { exit (p+0 < t+0) ? 1 : 0 }' \
            || { echo "::error::coverage ${pct}% is below the ${COVERAGE_MIN}% threshold"; exit 1; }
        env:
          COVERAGE_MIN: "80"
