# Focused linters for the parts of the repo the `spec` workflow does not
# already cover. Lua formatting (stylua) and linting (luacheck) are enforced in
# spec.yml; here we lint the GitHub Actions workflows, shell scripts, and the
# Dockerfile. (Replaces the old super-linter run, which linted vendored CSS and
# ignored the repo's own .luacheckrc/.stylua.toml.)
name: lint

on: [push, pull_request]

permissions:
  contents: read

jobs:
  # Validate the GitHub Actions workflows themselves.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2

  # ShellCheck is preinstalled on the ubuntu runners.
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: git ls-files '*.sh' | xargs -r shellcheck

  # Lint the runtime Dockerfile (Dockerfile.prod is a commented-out placeholder).
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
